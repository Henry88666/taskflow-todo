<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — 待办清单</title>
  <style>
    /* ── 变量 & 重置 ── */
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --primary-dark: #3730a3;
      --accent: #f59e0b;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.06);
      --radius: 14px;
      --transition: .22s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── 标题区 ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown .5s ease both;
    }

    .header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .header .logo svg {
      width: 36px; height: 36px;
      color: var(--primary);
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 4px;
    }

    /* ── 主容器 ── */
    .app {
      width: 100%;
      max-width: 560px;
      animation: fadeUp .6s ease both;
    }

    /* ── 输入区 ── */
    .input-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-field {
      flex: 1;
      position: relative;
    }

    .input-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }

    .input-field input[type="text"],
    .input-field input[type="date"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      color: var(--text);
      background: #fafafa;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
      font-family: inherit;
    }

    .input-field input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }

    .input-field input::placeholder { color: #c4c9d4; }

    /* 优先级选择 */
    .priority-group {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      align-items: center;
    }

    .priority-group span {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-right: 2px;
    }

    .priority-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fafafa;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-muted);
    }

    .priority-btn:hover { border-color: var(--primary); color: var(--primary); }

    .priority-btn.active-high   { background: #fef2f2; border-color: var(--danger); color: var(--danger); }
    .priority-btn.active-medium { background: #fffbeb; border-color: var(--accent);  color: #b45309; }
    .priority-btn.active-low    { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .btn-add:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(79,70,229,.35);
    }

    .btn-add:active { transform: translateY(0); }

    /* ── 统计栏 ── */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .stats-bar .count {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stats-bar .filters {
      display: flex;
      gap: 4px;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: none;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }

    .filter-btn:hover { color: var(--primary); background: var(--primary-light); }

    .filter-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* ── 任务列表 ── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      transition: all var(--transition);
      animation: slideIn .3s ease both;
      position: relative;
      overflow: hidden;
    }

    .task-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 14px 0 0 14px;
      background: var(--border);
      transition: background var(--transition);
    }

    .task-item[data-priority="high"]::before   { background: var(--danger); }
    .task-item[data-priority="medium"]::before{ background: var(--accent); }
    .task-item[data-priority="low"]::before    { background: var(--primary); }

    .task-item.completed {
      opacity: .55;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* 拖拽时视觉反馈 */
    .task-item.dragging {
      opacity: .5;
      box-shadow: var(--shadow-lg);
      transform: scale(1.01);
    }

    .task-item.drag-over {
      border: 2px dashed var(--primary);
    }

    /* 复选框 */
    .checkbox {
      position: relative;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .checkbox input { opacity: 0; width: 0; height: 0; position: absolute; }

    .checkmark {
      position: absolute;
      inset: 0;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: #fff;
      transition: all var(--transition);
    }

    .checkbox:hover .checkmark { border-color: var(--primary); }

    .checkbox input:checked + .checkmark {
      background: var(--primary);
      border-color: var(--primary);
    }

    .checkmark::after {
      content: '';
      position: absolute;
      left: 6px; top: 2px;
      width: 6px; height: 11px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) scale(0);
      transition: transform var(--transition);
    }

    .checkbox input:checked + .checkmark::after { transform: rotate(45deg) scale(1); }

    /* 任务文字区 */
    .task-content { flex: 1; min-width: 0; }

    .task-text {
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .task-date {
      font-size: 11.5px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .task-date svg { width: 11px; height: 11px; }

    .task-date.overdue { color: var(--danger); }

    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .priority-badge.high   { background: #fef2f2; color: var(--danger); }
    .priority-badge.medium { background: #fffbeb; color: #b45309; }
    .priority-badge.low    { background: var(--primary-light); color: var(--primary); }

    /* 操作按钮 */
    .task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity var(--transition); }

    .task-item:hover .task-actions { opacity: 1; }

    .action-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      color: var(--text-muted);
    }

    .action-btn svg { width: 15px; height: 15px; }

    .action-btn:hover { background: #f3f4f6; color: var(--text); }
    .action-btn.delete:hover { background: var(--danger-light); color: var(--danger); }

    /* ── 空状态 ── */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 72px; height: 72px;
      color: #d1d5db;
      margin-bottom: 16px;
    }

    .empty-state h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-state p  { font-size: 14px; }

    /* ── 清除完成按钮 ── */
    .clear-done {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 11px;
      margin-top: 12px;
      border-radius: var(--radius);
      border: 1.5px dashed var(--border);
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }

    .clear-done:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--danger-light);
    }

    .clear-done svg { width: 14px; height: 14px; }

    /* ── 动画 ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes pop {
      0%   { transform: scale(.92); opacity: 0; }
      70%  { transform: scale(1.04); }
      100% { transform: scale(1); opacity: 1; }
    }

    .task-item.just-added { animation: pop .3s ease both; }

    /* ── 进度条 ── */
    .progress-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-header span {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .progress-header .progress-pct {
      font-size: 14px;
      font-weight: 800;
      color: var(--primary);
    }

    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #818cf8);
      border-radius: 10px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* ── 响应式 ── */
    @media (max-width: 480px) {
      body { padding: 32px 12px 60px; }
      .header h1 { font-size: 24px; }
      .input-row { flex-wrap: wrap; }
      .input-field input[type="date"] { width: 100%; }
      .task-actions { opacity: 1; }
      .task-meta { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <!-- 标题 -->
  <header class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <h1>TaskFlow</h1>
    </div>
    <p>专注当下，高效每一天</p>
  </header>

  <main class="app">

    <!-- 输入区 -->
    <div class="input-card">
      <div class="input-row">
        <div class="input-field">
          <label>新任务</label>
          <input type="text" id="taskInput" placeholder="输入任务，回车添加…" maxlength="200" autocomplete="off" />
        </div>
        <div class="input-field" style="flex:0 0 160px;">
          <label>截止日期</label>
          <input type="date" id="dateInput" />
        </div>
        <button class="btn-add" id="addBtn" title="添加任务" aria-label="添加任务">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="priority-group">
        <span>优先级</span>
        <button class="priority-btn active-low" data-priority="low">低</button>
        <button class="priority-btn" data-priority="medium">中</button>
        <button class="priority-btn" data-priority="high">高</button>
      </div>
    </div>

    <!-- 进度条 -->
    <div class="progress-wrap">
      <div class="progress-header">
        <span>今日进度</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- 筛选栏 -->
    <div class="stats-bar">
      <span class="count" id="countText">共 0 项任务</span>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="active">待完成</button>
        <button class="filter-btn" data-filter="done">已完成</button>
      </div>
    </div>

    <!-- 任务列表 -->
    <div class="task-list" id="taskList" aria-live="polite" aria-label="任务列表"></div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M9 12l2 2 4-4"/>
      </svg>
      <h3>暂无任务</h3>
      <p>添加你的第一个待办事项吧</p>
    </div>

    <!-- 清除已完成 -->
    <button class="clear-done" id="clearDoneBtn" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
      </svg>
      清除已完成任务
    </button>

  </main>

  <script>
    /* ── 数据层 ── */
    let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
    let currentFilter = 'all';
    let selectedPriority = 'low';
    let dragSrc = null;

    function save() {
      localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
    }

    /* ── 工具 ── */
    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function formatDate(d) {
      if (!d) return '';
      const [y, m, day] = d.split('-');
      const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      return `${parseInt(m)}月${parseInt(day)}日`;
    }

    function isOverdue(dateStr) {
      if (!dateStr) return false;
      const today = new Date();
      today.setHours(0,0,0,0);
      return new Date(dateStr) < today;
    }

    /* ── 优先级按钮 ── */
    document.querySelectorAll('.priority-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.priority-btn').forEach(b => {
          b.className = 'priority-btn';
          b.classList.remove(`active-${b.dataset.priority}`);
        });
        btn.classList.add(`active-${btn.dataset.priority}`);
        selectedPriority = btn.dataset.priority;
      });
    });

    /* ── 筛选按钮 ── */
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    /* ── 添加任务 ── */
    const taskInput = document.getElementById('taskInput');
    const dateInput = document.getElementById('dateInput');

    // 设置默认日期为今天
    const today = new Date();
    dateInput.value = today.toISOString().slice(0, 10);
    dateInput.min = today.toISOString().slice(0, 10);

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) { taskInput.focus(); return; }

      tasks.unshift({
        id: uid(),
        text,
        date: dateInput.value,
        priority: selectedPriority,
        done: false,
        createdAt: new Date().toISOString()
      });

      save();
      taskInput.value = '';
      render();

      // 重置优先级为低
      document.querySelectorAll('.priority-btn').forEach(b => {
        b.className = 'priority-btn';
        if (b.dataset.priority === 'low') b.classList.add('active-low');
      });
      selectedPriority = 'low';
    }

    document.getElementById('addBtn').addEventListener('click', addTask);
    taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    /* ── 切换完成 ── */
    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      task.done = !task.done;
      save();
      render();
    }

    /* ── 删除任务 ── */
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    /* ── 编辑任务 ── */
    function editTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      const newText = prompt('编辑任务:', task.text);
      if (newText !== null && newText.trim()) {
        task.text = newText.trim();
        save();
        render();
      }
    }

    /* ── 清除已完成 ── */
    document.getElementById('clearDoneBtn').addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    });

    /* ── 渲染 ── */
    function render() {
      const list = document.getElementById('taskList');
      const empty = document.getElementById('emptyState');
      const clearBtn = document.getElementById('clearDoneBtn');
      const progressPct = document.getElementById('progressPct');
      const progressFill = document.getElementById('progressFill');
      const countText = document.getElementById('countText');

      let filtered = tasks;
      if (currentFilter === 'active') filtered = tasks.filter(t => !t.done);
      if (currentFilter === 'done')   filtered = tasks.filter(t =>  t.done);

      // 统计
      const total = tasks.length;
      const done  = tasks.filter(t => t.done).length;
      const pct = total === 0 ? 0 : Math.round((done / total) * 100);

      progressPct.textContent = total === 0 ? '0%' : `${pct}%`;
      progressFill.style.width = `${pct}%`;
      countText.textContent = `共 ${total} 项任务 · ${done} 已完成`;

      // 空状态
      if (filtered.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        clearBtn.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      clearBtn.style.display = done > 0 ? 'flex' : 'none';

      // 渲染任务
      list.innerHTML = filtered.map((task, i) => `
        <div class="task-item${task.done ? ' completed' : ''}"
             data-id="${task.id}"
             data-priority="${task.priority}"
             draggable="true">
          <label class="checkbox">
            <input type="checkbox" ${task.done ? 'checked' : ''}
                   onchange="toggleTask('${task.id}')" aria-label="标记完成" />
            <span class="checkmark"></span>
          </label>
          <div class="task-content">
            <div class="task-text">${escHtml(task.text)}</div>
            <div class="task-meta">
              ${task.date ? `
                <span class="task-date${task.done ? '' : isOverdue(task.date) ? ' overdue' : ''}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                       stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                  </svg>
                  ${formatDate(task.date)}${!task.done && isOverdue(task.date) ? ' · 已过期' : ''}
                </span>` : ''}
              <span class="priority-badge ${task.priority}">
                ${task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低'}
              </span>
            </div>
          </div>
          <div class="task-actions">
            <button class="action-btn" onclick="editTask('${task.id}')" title="编辑" aria-label="编辑任务">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="action-btn delete" onclick="deleteTask('${task.id}')" title="删除" aria-label="删除任务">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');

      // 拖拽事件
      attachDragEvents();
    }

    function escHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    /* ── 拖拽排序 ── */
    function attachDragEvents() {
      document.querySelectorAll('.task-item').forEach(item => {
        item.addEventListener('dragstart', e => {
          dragSrc = item;
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });

        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          document.querySelectorAll('.task-item').forEach(el => el.classList.remove('drag-over'));
        });

        item.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (item !== dragSrc) item.classList.add('drag-over');
        });

        item.addEventListener('dragleave', () => {
          item.classList.remove('drag-over');
        });

        item.addEventListener('drop', e => {
          e.preventDefault();
          item.classList.remove('drag-over');
          if (!dragSrc || item === dragSrc) return;

          const allItems = [...document.querySelectorAll('.task-item')];
          const fromId = dragSrc.dataset.id;
          const toId   = item.dataset.id;

          const fromIdx = tasks.findIndex(t => t.id === fromId);
          const toIdx   = tasks.findIndex(t => t.id === toId);

          const [moved] = tasks.splice(fromIdx, 1);
          tasks.splice(toIdx, 0, moved);
          save();
          render();
        });
      });
    }

    /* ── 启动 ── */
    render();
  </script>
</body>
</html>
